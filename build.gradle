plugins {
    id 'org.jetbrains.kotlin.jvm' version '1.6.10'
}

group 'com.rooksoto'
version '0.1-HelloWorld'

repositories {
    mavenCentral()
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.amshove.kluent:kluent:1.68'
}